name: "Protocal Buffer Go Stubs Generation"
on:
    push:
        tags:
            - v**

permissions:
    contents: write

jobs:
    protoc:
        name: "Generate"
        runs-on: ubuntu-latest
        strategy:
            matrix:
                services: ["user"]
        steps:
            - name: Install Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.26"

            - uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract Release Version
              run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
            - name: Generate for Golang
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              shell: bash
              run: |
                  git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/Yusufdot101/ripple-proto.git
                  chmod +x "${GITHUB_WORKSPACE}/run.sh"
                  ./run.sh ${{ matrix.services }} ${{ env.RELEASE_VERSION }}
